name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: store_api
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        run: ./mvnw test
        env:
          MYSQL_USER: root
          MYSQL_PASSWORD: test
          JWT_SECRET: test-jwt-secret-key-for-ci-must-be-at-least-32-chars
          STRIPE_SECRET_KEY: dummy_sk_test
          STRIPE_WEBHOOK_SECRET_KEY: dummy_whsec_test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service store-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
